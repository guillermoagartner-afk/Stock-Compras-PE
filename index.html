", "emp": "Planeta", "und": "kg"}, {"id": "20201502", "desc": "Cebolla Cubeteada por kilos", "pareto": "C", "rubro": "Vegetales procesados / semielaborados", "emp": "Planeta", "und": "kg"}];

let stocks = {};
let paretoF = "";
let artsFiltrados = [...ART];
let paginaActual = 0;
const POR_PAGINA = 25;

function setP(p) {
  paretoF = p;
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  const m = {"":"all","A":"pa","B":"pb","C":"pc"};
  document.querySelector(".chip."+m[p]).classList.add("active");
  filtrar();
}

function filtrar() {
  const bus = (document.getElementById("buscar").value||"").toLowerCase().trim();
  const rubro = document.getElementById("filtro-rubro").value;
  artsFiltrados = ART.filter(a => {
    if(paretoF && a.pareto !== paretoF) return false;
    if(rubro && a.rubro !== rubro) return false;
    if(bus && !a.desc.toLowerCase().includes(bus) && !a.id.includes(bus)) return false;
    return true;
  });
  paginaActual = 0;
  document.getElementById("lista").innerHTML = "";
  renderPagina();
}

function renderPagina() {
  const lista = document.getElementById("lista");
  const inicio = paginaActual * POR_PAGINA;
  const fin = inicio + POR_PAGINA;
  const lote = artsFiltrados.slice(inicio, fin);

  if(inicio === 0 && lote.length === 0) {
    lista.innerHTML = '<div class="empty">Sin artículos que coincidan</div>';
    return;
  }

  // Agrupar lote por rubro
  const grupos = {};
  lote.forEach(a => {
    const r = a.rubro || "Sin rubro";
    if(!grupos[r]) grupos[r] = [];
    grupos[r].push(a);
  });

  // Quitar botón "cargar más" si existía
  const prev = lista.querySelector(".load-more");
  if(prev) prev.remove();

  Object.entries(grupos).forEach(([rubro, grupo]) => {
    // Evitar duplicar encabezado de rubro si ya existe
    const rubroId = "rh-" + rubro.replace(/[^a-z0-9]/gi,"_");
    if(!document.getElementById(rubroId)) {
      const rh = document.createElement("div");
      rh.className = "rubro-header";
      rh.id = rubroId;
      rh.textContent = rubro;
      lista.appendChild(rh);
    }
    grupo.forEach(a => {
      if(!document.getElementById("card-"+a.id)) {
        lista.appendChild(crearCard(a));
      }
    });
  });

  // Botón cargar más
  if(fin < artsFiltrados.length) {
    const btn = document.createElement("div");
    btn.className = "load-more";
    btn.textContent = "Cargar más (" + (artsFiltrados.length - fin) + " restantes)";
    btn.onclick = () => { paginaActual++; renderPagina(); };
    lista.appendChild(btn);
  }

  paginaActual++;
}

function crearCard(a) {
  const val = stocks[a.id] !== undefined ? stocks[a.id] : "";
  const ok = val !== "";
  const div = document.createElement("div");
  div.className = "art-card" + (ok?" ok":"");
  div.id = "card-"+a.id;
  const bpCls = "bp-"+(a.pareto||"c").toLowerCase();
  div.innerHTML = `
    <div class="art-top">
      <div class="art-desc">${a.desc}</div>
      <div class="art-id">${a.id}</div>
    </div>
    <div class="art-meta">
      <span class="bp ${bpCls}">${a.pareto||"—"}</span>
      <span class="art-und">${a.und||"unid"}</span>
    </div>
    <div class="inp-row">
      <label>Stock:</label>
      <div class="qty-wrap">
        <button class="qbtn" onclick="cambiar('${a.id}',-1)">−</button>
        <input class="qinp" type="number" inputmode="decimal" min="0" step="0.1"
          id="q-${a.id}" value="${val}" placeholder="0"
          oninput="set('${a.id}',this.value)">
        <button class="qbtn" onclick="cambiar('${a.id}',1)">+</button>
      </div>
      <button class="clr" id="clr-${a.id}" onclick="limpiar('${a.id}')" style="display:${ok?'block':'none'}">✕</button>
    </div>`;
  return div;
}

function set(id, val) {
  const n = parseFloat(val);
  if(val===""||val===null) { delete stocks[id]; }
  else if(!isNaN(n)&&n>=0) { stocks[id]=n; }
  const card=document.getElementById("card-"+id);
  const ok=stocks[id]!==undefined;
  if(card)card.className="art-card"+(ok?" ok":"");
  const clr=document.getElementById("clr-"+id);
  if(clr)clr.style.display=ok?"block":"none";
  actualizarConteo();
}

function cambiar(id, d) {
  const inp=document.getElementById("q-"+id);
  const n=Math.max(0,(parseFloat(inp.value)||0)+d);
  inp.value=n; set(id,n);
}

function limpiar(id) {
  const inp=document.getElementById("q-"+id);
  if(inp)inp.value="";
  delete stocks[id];
  const card=document.getElementById("card-"+id);
  if(card)card.className="art-card";
  const clr=document.getElementById("clr-"+id);
  if(clr)clr.style.display="none";
  actualizarConteo();
}

function actualizarConteo() {
  const n=Object.keys(stocks).length;
  document.getElementById("clabel").innerHTML=n===0?"Cargá el stock de cada artículo":"<b>"+n+"</b> artículo"+(n>1?"s":"")+" cargado"+(n>1?"s":"");
  document.getElementById("ctotal").textContent=n>0?"de "+ART.length+" totales":"";
  const fab=document.getElementById("fab");
  fab.disabled=n===0;
  document.getElementById("fhint").textContent=n>0?n+" artículo"+(n>1?"s":"")+" listo"+(n>1?"s":"")+" para enviar":"Completá al menos un artículo";
}

function abrirModal() {
  const ents=Object.entries(stocks);
  document.getElementById("mtit").textContent="Confirmar envío ("+ents.length+" artículo"+(ents.length>1?"s":"")+")";
  document.getElementById("mresumen").innerHTML=ents.map(([id,qty])=>{
    const a=ART.find(x=>x.id===id);
    return`<div class="mrow"><span style="flex:1;margin-right:8px">${a?a.desc:id}</span><b style="color:#185FA5">${qty} ${a?a.und||"":""}</b></div>`;
  }).join("");
  document.getElementById("mov").classList.add("open");
}

function cerrarModal() {
  document.getElementById("mov").classList.remove("open");
}

async function enviar() {
  const btn=document.getElementById("mbtn");
  btn.textContent="Enviando..."; btn.disabled=true;
  let ok=0,err=0;
  for(const [id,stock] of Object.entries(stocks)) {
    try {
      const r=await fetch(`${SHEETS_URL}?action=setStock&id=${encodeURIComponent(id)}&stock=${stock}`);
      const j=await r.json();
      if(j.ok)ok++; else err++;
    } catch(e){err++;}
  }
  cerrarModal();
  if(err===0){
    stocks={};
    filtrar();
    toast("✓ Stock enviado: "+ok+" artículos actualizados");
  } else if(ok>0){
    toast("⚠ "+ok+" OK, "+err+" con error");
  } else {
    toast("✗ Sin conexión. Verificá el internet.");
  }
  btn.textContent="Enviar"; btn.disabled=false;
}

function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3500);
}

// Scroll infinito
window.addEventListener("scroll",()=>{
  if((window.innerHeight+window.scrollY)>=document.body.offsetHeight-200){
    const btn=document.querySelector(".load-more");
    if(btn)btn.click();
  }
});

// Arrancar
filtrar();
</script>
